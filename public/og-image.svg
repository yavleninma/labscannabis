<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#111111"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <!-- Border -->
  <rect x="40" y="40" width="1120" height="550" rx="20" fill="none" stroke="#262626" stroke-width="1"/>
  <!-- Logo circle -->
  <circle cx="600" cy="220" r="60" fill="none" stroke="#10b981" stroke-width="2" opacity="0.3"/>
  <text x="600" y="235" text-anchor="middle" fill="#10b981" font-family="system-ui, sans-serif" font-size="36" font-weight="bold">LC</text>
  <!-- Title -->
  <text x="600" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="56" font-weight="bold">
    <tspan fill="#10b981">Labs</tspan><tspan fill="#ffffff"> Cannabis</tspan>
  </text>
  <!-- Subtitle -->
  <text x="600" y="380" text-anchor="middle" fill="#a3a3a3" font-family="system-ui, sans-serif" font-size="22">
    Licensed Medical Cannabis Dispensary
  </text>
  <!-- Location -->
  <text x="600" y="420" text-anchor="middle" fill="#737373" font-family="system-ui, sans-serif" font-size="18">
    Soi Hollywood, Pattaya — Open 24/7
  </text>
  <!-- Bottom accent line -->
  <rect x="500" y="470" width="200" height="2" rx="1" fill="#10b981" opacity="0.5"/>
  <!-- Phone -->
  <text x="600" y="510" text-anchor="middle" fill="#737373" font-family="system-ui, sans-serif" font-size="16">
    +66 66 080 6784
  </text>
</svg>
